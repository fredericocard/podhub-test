<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#e8dcc8">
  <title>PodHub - Review Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Jaldi:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #e8dcc8;
    }

    .app {
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 0 24px;
      padding-top: env(safe-area-inset-top, 16px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0 6px;
      flex-shrink: 0;
    }

    .header-back {
      color: rgb(90,110,98);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      width: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-back:active { transform: scale(0.85); }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: rgb(44,62,54);
    }

    /* ── Stage ── */
    .stage {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .stage::-webkit-scrollbar { display: none; }

    /* ── Cards Container ── */
    .cards-track {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      padding: 8px 0;
    }

    /* ── Question Card ── */
    .q-card {
      width: 100%;
      background: rgb(245,239,227);
      border-radius: 16px;
      border: 1.5px solid rgb(184,168,138);
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transform-origin: center center;
      overflow: hidden;
      /* Smooth transitions for all state changes */
      transition: padding 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  border-left 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Inactive: collapsed, faded */
    .q-card.inactive {
      padding: 10px 14px;
      opacity: 0.45;
      transform: scale(0.96);
    }

    .q-card.inactive .q-badge { display: none; }

    .q-card.inactive .q-header {
      justify-content: center;
    }

    .q-card.inactive .q-header-text {
      flex: none;
      text-align: center;
    }

    .q-card.inactive .q-step { display: none; }
    .q-card.inactive .q-sub { display: none; }

    /* Done: slightly more visible than future */
    .q-card.done {
      opacity: 0.55;
      border-color: rgb(26,122,106);
      border-left: 3px solid rgb(26,122,106);
    }

    .q-card.done .q-badge { display: none; }
    .q-card.done .q-sub { display: none; }

    .q-card.done .q-header {
      justify-content: center;
    }

    .q-card.done .q-header-text {
      flex: 1;
      text-align: left;
    }

    /* ── Answer preview (on done cards) ── */
    .q-answer {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .q-answer-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid rgb(26,122,106);
    }

    .q-answer-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .q-answer-name {
      font-size: 11px;
      font-weight: 600;
      color: rgb(26,122,106);
    }

    /* Active: full size, prominent */
    .q-card.active {
      box-shadow: 0 8px 28px rgba(26,20,13,0.1);
      overflow: visible;
    }

    /* ── Options slide-in ── */
    .q-options {
      animation: optionsSlideIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }

    @keyframes optionsSlideIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── Badge pop ── */
    .q-card.active .q-badge {
      animation: badgePop 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    @keyframes badgePop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── Card becoming done: shrink transition ── */
    .q-card.just-done {
      animation: cardShrink 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
      overflow: hidden;
    }

    .q-card.just-done .q-header {
      flex-direction: column;
      text-align: center;
    }

    .q-card.just-done .q-header-text {
      text-align: center;
    }

    .q-card.just-done .q-options {
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    @keyframes cardShrink {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.96); opacity: 0.55; }
    }

    /* ── Card becoming active ── */
    .q-card.just-active {
      animation: cardGrow 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }

    @keyframes cardGrow {
      0% { transform: scale(0.96); opacity: 0.45; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── Card Header Row (always visible) ── */
    .q-header {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .q-card.active .q-header {
      flex-direction: column;
      text-align: center;
    }

    .q-card.active .q-header-text {
      text-align: center;
    }

    .q-card.active .q-step {
      display: none;
    }

    .q-badge {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgb(222,212,192);
      border: 1.5px solid rgb(184,168,138);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .q-badge svg { width: 18px; height: 18px; }

    .q-card.done .q-badge {
      background: rgba(26,122,106,0.1);
      border-color: rgb(26,122,106);
    }

    .q-header-text {
      flex: 1;
      min-width: 0;
    }

    .q-text {
      font-size: 14px;
      font-weight: 700;
      color: rgb(44,62,54);
      line-height: 1.3;
    }

    .q-sub {
      font-size: 10px;
      color: rgb(90,110,98);
      margin-top: 1px;
    }

    /* Answer preview (shown on done+inactive cards) */
    .q-answer {
      font-size: 11px;
      font-weight: 600;
      color: rgb(26,122,106);
      margin-left: auto;
      flex-shrink: 0;
      padding-left: 8px;
    }

    /* Step number */
    .q-step {
      font-family: 'Jaldi', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: rgb(160,148,128);
      margin-left: auto;
      flex-shrink: 0;
    }

    .q-card.active .q-step { color: rgb(26,122,106); }

    /* ── Options area (only in active card) ── */
    .q-options {
      width: 100%;
      margin-top: 14px;
    }

    .options-row {
      display: flex;
      gap: 5px;
      width: 100%;
    }

    .opt {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 2px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .opt:active { transform: scale(0.9); }

    .opt.selected {
      border-color: rgb(26,122,106);
      background: rgba(26,122,106,0.08);
    }

    .opt.selected .opt-avatar {
      animation: optPop 0.4s cubic-bezier(0.34, 1.5, 0.64, 1);
    }

    @keyframes optPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.15); }
      70% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    /* Unselected options fade out when one is picked */
    .options-row.has-selection .opt:not(.selected) {
      opacity: 0.4;
      transform: scale(0.95);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .opt-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgb(184,168,138);
      position: relative;
      transition: all 0.2s ease;
    }

    .opt-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .opt.selected .opt-avatar {
      border-color: rgb(26,122,106);
      box-shadow: 0 0 0 2.5px rgb(26,122,106);
      transition: all 0.3s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    .opt-check {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(26,122,106,0.65);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0);
      transition: all 0.3s cubic-bezier(0.34, 1.5, 0.64, 1);
    }

    .opt.selected .opt-check { opacity: 1; transform: scale(1); }

    .opt-name {
      font-size: 9px; font-weight: 600; color: rgb(44,62,54);
      text-align: center; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; width: 100%;
    }

    .opt-sub {
      font-size: 7px; color: rgb(90,110,98); text-align: center;
    }

    .skip-opt {
      justify-content: center;
    }

    .skip-arrow {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgb(232,224,210);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .skip-opt:active .skip-arrow {
      background: rgb(222,212,192);
    }

    /* ── Custom Bracket Dropdown ── */
    .bracket-dropdown {
      width: 100%;
      position: relative;
    }

    .bracket-trigger {
      width: 100%;
      padding: 12px 14px;
      background: rgb(222,212,192);
      border-radius: 10px;
      border: 1.5px solid rgb(184,168,138);
      color: rgb(44,62,54);
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bracket-trigger::after {
      content: '';
      margin-left: auto;
      width: 12px; height: 8px;
      flex-shrink: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%235a6e62' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      transition: transform 0.2s ease;
    }

    .bracket-dropdown.open .bracket-trigger::after {
      transform: rotate(180deg);
    }

    .bracket-dropdown.open .bracket-trigger {
      border-color: rgb(26,122,106);
      border-radius: 10px 10px 0 0;
    }

    .bracket-trigger-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 1.5px solid rgb(184,168,138);
    }

    .bracket-trigger-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .bracket-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: rgb(245,239,227);
      border: 1.5px solid rgb(26,122,106);
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 8px 20px rgba(26,20,13,0.12);
    }

    .bracket-dropdown.open .bracket-menu { display: block; }

    .bracket-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: rgb(44,62,54);
      transition: background 0.15s ease;
    }

    .bracket-item:active { background: rgba(26,122,106,0.08); }

    .bracket-item + .bracket-item {
      border-top: 1px solid rgba(184,168,138,0.3);
    }

    .bracket-item-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 1.5px solid rgb(184,168,138);
    }

    .bracket-item-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .bracket-item-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(26,122,106,0.1);
      border: 1.5px solid rgba(26,122,106,0.3);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .bracket-item-text {
      flex: 1; min-width: 0;
    }

    .bracket-item-name {
      font-size: 13px; font-weight: 600; color: rgb(44,62,54);
    }

    .bracket-item-sub {
      font-size: 9px; color: rgb(90,110,98);
    }

    .bracket-item.selected {
      background: rgba(26,122,106,0.08);
    }

    .bracket-item-check {
      margin-left: auto;
      flex-shrink: 0;
      opacity: 0;
    }

    .bracket-item.selected .bracket-item-check {
      opacity: 1;
    }

    /* ── Confirmation Card ── */
    .q-card.confirm-card {
      border-color: rgb(26,122,106);
      box-shadow: 0 8px 28px rgba(26,120,105,0.15);
    }

    .confirm-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(26,122,106,0.1); border: 2px solid rgb(26,122,106);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 8px;
    }

    .confirm-title { font-size: 15px; font-weight: 700; color: rgb(44,62,54); margin-bottom: 2px; text-align: center; }
    .confirm-sub-text { font-size: 11px; color: rgb(90,110,98); margin-bottom: 12px; text-align: center; }

    .c-row {
      display: flex; align-items: center; gap: 8px; padding: 5px 0; text-align: left;
    }

    .c-row + .c-row { border-top: 1px solid rgba(184,168,138,0.3); }

    .c-row-icon {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgb(222,212,192); border: 1px solid rgb(184,168,138);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .c-row-icon svg { width: 11px; height: 11px; }
    .c-row-label { font-size: 10px; color: rgb(90,110,98); width: 60px; flex-shrink: 0; }
    .c-row-value { font-size: 10px; font-weight: 600; color: rgb(44,62,54); flex: 1; text-align: right; }

    /* ── Bottom Button ── */
    .bottom-area {
      flex-shrink: 0;
      padding: 8px 0 16px;
    }

    .action-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgb(14,92,77) 0%, rgb(26,122,106) 50%, rgb(42,143,120) 100%);
      border: 1.5px solid rgb(56,158,133);
      color: rgb(245,239,227);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(26,120,105,0.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .action-btn:active { transform: scale(0.97); }
    .action-btn.disabled { opacity: 0.35; pointer-events: none; }

    /* ══════════════════════════════════════
       Memory Card — Collectible Game Card
       ══════════════════════════════════════ */
    .mc-overlay {
      position: fixed;
      inset: 0;
      background: rgba(232,220,200,0.45);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .mc-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── The Card ── */
    .mc {
      width: 100%;
      max-width: 360px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(184,146,46,0.3),
        0 0 30px rgba(184,146,46,0.08),
        0 30px 80px rgba(8,12,10,0.5);
      transform: translateY(40px) scale(0.92);
      transition: transform 0.55s cubic-bezier(0.34, 1.25, 0.64, 1);
      position: relative;
    }

    .mc-overlay.show .mc {
      transform: translateY(0) scale(1);
    }

    /* ── Rich Background ── */
    .mc-bg {
      background: linear-gradient(165deg,
        rgb(12,42,35) 0%,
        rgb(18,62,52) 25%,
        rgb(26,82,68) 50%,
        rgb(14,52,44) 75%,
        rgb(10,32,28) 100%);
      position: relative;
    }

    /* Subtle texture overlay */
    .mc-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(184,146,46,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(26,122,106,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    /* Foil shimmer */
    .mc-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 20%,
        rgba(255,255,255,0.03) 35%,
        rgba(255,255,255,0.06) 38%,
        rgba(255,255,255,0.03) 41%,
        transparent 60%
      );
      pointer-events: none;
      z-index: 2;
    }

    .mc-inner {
      position: relative;
      z-index: 3;
    }

    /* ── Game Info (top) ── */
    .mc-info {
      padding: 14px 16px 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .mc-pod {
      font-size: 11px;
      font-weight: 600;
      color: rgba(245,239,227,0.7);
      letter-spacing: 0.3px;
    }

    .mc-date {
      font-size: 9px;
      color: rgba(245,239,227,0.4);
    }

    .mc-aura {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mc-aura-icon {
      color: rgb(60,130,185);
    }

    .mc-aura-val {
      font-family: 'Jaldi', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: rgb(60,130,185);
    }

    .mc-aura.loss .mc-aura-icon,
    .mc-aura.loss .mc-aura-val {
      color: rgb(168,74,58);
    }

    /* ── Commander Slices (Hero Image) ── */
    .mc-slices {
      height: 200px;
      display: flex;
      position: relative;
      margin: 0 12px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(184,146,46,0.2);
    }

    .mc-slice {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .mc-slice img {
      position: absolute;
      top: 0; left: -30%;
      width: 160%;
      height: 100%;
      object-fit: cover;
    }

    /* Angled cuts via clip-path */
    .mc-slice:nth-child(1) { clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); z-index: 4; }
    .mc-slice:nth-child(2) { clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); margin-left: -8%; z-index: 3; }
    .mc-slice:nth-child(3) { clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); margin-left: -8%; z-index: 2; }
    .mc-slice:nth-child(4) { clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); margin-left: -8%; z-index: 1; }

    /* Subtle divider lines between slices */
    .mc-slice::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 1px; height: 100%;
      background: rgba(184,146,46,0.3);
      z-index: 5;
    }

    .mc-slice:last-child::after { display: none; }

    /* Gradient overlay on slices for readability */
    .mc-slices::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(12,42,35,0.1) 0%,
        transparent 30%,
        transparent 60%,
        rgba(12,42,35,0.5) 100%
      );
      z-index: 5;
      pointer-events: none;
      border-radius: 12px;
    }

    /* ── Winner Banner ── */
    .mc-winner {
      margin: -24px 12px 0;
      position: relative;
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: linear-gradient(135deg,
        rgba(184,146,46,0.15) 0%,
        rgba(184,146,46,0.08) 100%);
      border: 1px solid rgba(184,146,46,0.3);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .mc-winner-crown {
      font-size: 18px;
      flex-shrink: 0;
    }

    .mc-winner-info { flex: 1; }

    .mc-winner-label {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgb(184,146,46);
    }

    .mc-winner-name {
      font-size: 15px;
      font-weight: 700;
      color: rgb(245,239,227);
      line-height: 1.2;
    }

    .mc-winner-player {
      font-size: 10px;
      color: rgba(245,239,227,0.5);
    }

    /* ── Players Row ── */
    .mc-players {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 14px 16px 10px;
    }

    .mc-p {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .mc-p-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid rgba(184,168,138,0.4);
    }

    .mc-p-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .mc-p.is-winner .mc-p-avatar {
      border-color: rgb(184,146,46);
      box-shadow: 0 0 8px rgba(184,146,46,0.3);
    }

    .mc-p-commander {
      font-size: 8px;
      font-weight: 600;
      color: rgba(245,239,227,0.8);
      text-align: center;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mc-p-name {
      font-size: 7px;
      color: rgba(245,239,227,0.4);
      text-align: center;
    }

    /* ── Badges + Aura Row ── */
    .mc-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px 14px;
    }

    .mc-badge-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(245,239,227,0.08);
      border: 1px solid rgba(184,168,138,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mc-badge-circle svg { width: 14px; height: 14px; }

    .mc-badge-count {
      position: absolute;
      top: -4px; right: -4px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgb(26,122,106);
      font-size: 8px;
      font-weight: 700;
      color: rgb(245,239,227);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(12,42,35,0.5);
    }

    /* ── Thin Divider ── */
    .mc-divider {
      height: 1px;
      margin: 0 24px;
      background: linear-gradient(90deg, transparent 0%, rgba(184,146,46,0.2) 50%, transparent 100%);
    }

    /* ── Card + Actions Wrapper ── */
    .mc-wrapper {
      position: relative;
      width: 100%;
      max-width: 360px;
    }

    /* ── Actions (small corner buttons) ── */
    .mc-actions {
      position: absolute;
      bottom: -18px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }

    .mc-act {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(245,239,227,0.85);
      border: 1.5px solid rgb(184,168,138);
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 2px 8px rgba(26,20,13,0.12);
    }

    .mc-act:active {
      transform: scale(0.9);
      background: rgba(245,239,227,0.95);
    }

    .mc-act-icon {
      color: rgb(44,62,54);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mc-profile-area {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      padding: 8px 24px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
      z-index: 1001;
    }

    .mc-profile {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgb(14,92,77) 0%, rgb(26,122,106) 50%, rgb(42,143,120) 100%);
      border: 1.5px solid rgb(56,158,133);
      color: rgb(245,239,227);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(26,120,105,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .mc-profile:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-back" onclick="history.back()">‹</div>
    <div class="header-title">Review Game</div>
  </div>

  <div class="stage" id="stage">
    <div class="cards-track" id="track"></div>
  </div>

  <!-- Memory Card Overlay -->
  <div class="mc-overlay" id="mcOverlay" onclick="closeCard(event)">
    <div class="mc-wrapper" onclick="event.stopPropagation()">
      <div class="mc" id="mcCard"></div>
      <div class="mc-actions" id="mcActions"></div>
    </div>
    <div class="mc-profile-area" onclick="event.stopPropagation()">
      <div class="mc-profile" onclick="closeCard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgb(245,239,227)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </div>
    </div>
  </div>

  <div class="bottom-area">
    <div class="action-btn disabled" id="actionBtn" onclick="handleAction()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgb(245,239,227)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="actionLabel">Accept Review</span>
    </div>
  </div>
</div>

<script>
const players = [
  { name:"Frederico", commander:"Omnath, Locus", commanderFull:"Omnath, Locus of Creation", img:"https://cards.scryfall.io/art_crop/front/4/e/4e4fb50c-a81f-44d3-93c5-fa9a0b37f617.jpg" },
  { name:"Manel", commander:"Krenko", commanderFull:"Krenko, Mob Boss", img:"https://cards.scryfall.io/art_crop/front/c/d/cd9fef1d-fbdc-4e44-9740-d214f712e067.jpg" },
  { name:"Sofia", commander:"Atraxa", commanderFull:"Atraxa, Praetors' Voice", img:"https://cards.scryfall.io/art_crop/front/d/0/d0d33d52-3d28-4f2d-b7f6-92571f2f0e0e.jpg" },
  { name:"Tomás", commander:"Muldrotha", commanderFull:"Muldrotha, the Gravetide", img:"https://cards.scryfall.io/art_crop/front/c/6/c654737d-34ac-42ff-ae27-3a3bbb930fc1.jpg" },
];

const Q = [
  { key:'brilliance', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(184,146,46)" stroke-width="2" stroke-linejoin="round"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9"/></svg>', text:"Best strategy?", sub:"Brilliance" },
  { key:'flavor', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(168,74,58)" stroke-width="2" stroke-linecap="round"><path d="M12 22C12 22 4 16 4 10C4 6 7 3 10 3C11.2 3 12 3.8 12 3.8C12 3.8 12.8 3 14 3C17 3 20 6 20 10C20 16 12 22 12 22Z"/></svg>', text:"Most flavorful deck?", sub:"Flavor" },
  { key:'rivalry', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(90,110,98)" stroke-width="2" stroke-linecap="round"><path d="M6 4L18 20M18 4L6 20"/><path d="M4 12H20"/></svg>', text:"Biggest rival?", sub:"Rivalry" },
  { key:'allegiance', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(26,122,106)" stroke-width="2" stroke-linejoin="round"><path d="M12 3L20 9V17L12 21L4 17V9L12 3Z"/></svg>', text:"Strongest ally?", sub:"Allegiance" },
  { key:'fun', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(90,110,98)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8 14C8 14 9.5 16 12 16C14.5 16 16 14 16 14"/><circle cx="9" cy="10" r="1" fill="rgb(90,110,98)"/><circle cx="15" cy="10" r="1" fill="rgb(90,110,98)"/></svg>', text:"Most fun to play with?", sub:"Fun" },
  { key:'bracket', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(184,146,46)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>', text:"Deck above bracket?", sub:"", type:'dropdown' },
];

const labels = { brilliance:'Brilliance', flavor:'Flavor', rivalry:'Rivalry', allegiance:'Allegiance', fun:'Fun', bracket:'Bracket' };
const iconsSm = {
  brilliance:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(184,146,46)" stroke-width="2" stroke-linejoin="round"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9"/></svg>',
  flavor:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(168,74,58)" stroke-width="2" stroke-linecap="round"><path d="M12 22C12 22 4 16 4 10C4 6 7 3 10 3C11.2 3 12 3.8 12 3.8C12 3.8 12.8 3 14 3C17 3 20 6 20 10C20 16 12 22 12 22Z"/></svg>',
  rivalry:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(90,110,98)" stroke-width="2" stroke-linecap="round"><path d="M6 4L18 20M18 4L6 20"/><path d="M4 12H20"/></svg>',
  allegiance:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(26,122,106)" stroke-width="2" stroke-linejoin="round"><path d="M12 3L20 9V17L12 21L4 17V9L12 3Z"/></svg>',
  fun:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(90,110,98)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8 14C8 14 9.5 16 12 16C14.5 16 16 14 16 14"/><circle cx="9" cy="10" r="1" fill="rgb(90,110,98)"/><circle cx="15" cy="10" r="1" fill="rgb(90,110,98)"/></svg>',
  bracket:'<svg viewBox="0 0 24 24" fill="none" stroke="rgb(184,146,46)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>'
};

let cur = 0;
let ans = {};
let isConfirm = false;

function allDone() { return Q.every(q => ans[q.key] !== undefined); }

function render() {
  const track = document.getElementById('track');
  let html = '';

  for (let i = 0; i < Q.length; i++) {
    const q = Q[i];
    const isAct = !isConfirm && i === cur;
    const isDone = ans[q.key] !== undefined;
    const sel = ans[q.key] ? ans[q.key].value : null;

    let cls = 'q-card';
    if (isAct) cls += ' active';
    else if (isDone) cls += ' done inactive';
    else cls += ' inactive';

    html += `<div class="${cls}" onclick="${isAct ? '' : `cardClick(${i})`}" data-idx="${i}">`;

    // Header row — always visible
    html += `<div class="q-header">`;
    html += `<div class="q-badge">${q.icon}</div>`;
    html += `<div class="q-header-text">
      <div class="q-text">${q.text}</div>
      <div class="q-sub">${q.sub}</div>
    </div>`;

    if (!isAct && isDone) {
      const a = ans[q.key];
      if (a.value >= 0) {
        html += `<div class="q-answer">
          <div class="q-answer-avatar"><img src="${players[a.value].img}"></div>
          <div class="q-answer-name">${a.name}</div>
        </div>`;
      } else {
        html += `<div class="q-answer"><div class="q-answer-name">${a.name}</div></div>`;
      }
    } else if (!isAct) {
      html += `<div class="q-step">${i + 1}/${Q.length}</div>`;
    }

    html += `</div>`; // close q-header

    // Options area — only for active card
    if (isAct) {
      html += `<div class="q-options">`;
      if (q.type === 'dropdown') {
        const selVal = ans[q.key] ? ans[q.key].raw : null;
        let triggerContent = '<span style="color:rgb(138,154,142)">Select a deck...</span>';
        if (selVal === 'balanced') {
          triggerContent = `<span style="font-size:16px;">👍</span> <span>All decks were balanced</span>`;
        } else if (selVal !== null) {
          const sp = players[parseInt(selVal)];
          triggerContent = `<div class="bracket-trigger-avatar"><img src="${sp.img}"></div> <span>${sp.commanderFull}</span>`;
        }

        html += `
          <div class="bracket-dropdown" id="bracketDD" onclick="event.stopPropagation();toggleBracket()">
            <div class="bracket-trigger">${triggerContent}</div>
            <div class="bracket-menu">
              <div class="bracket-item${selVal==='balanced'?' selected':''}" onclick="event.stopPropagation();pickBracket('balanced')">
                <div class="bracket-item-icon">
                  <span style="font-size:16px;line-height:1;">👍</span>
                </div>
                <div class="bracket-item-text">
                  <div class="bracket-item-name">All decks were balanced</div>
                  <div class="bracket-item-sub">No deck was above bracket</div>
                </div>
                <div class="bracket-item-check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgb(26,122,106)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
              </div>
              ${players.map((p,i) => `
                <div class="bracket-item${selVal===String(i)?' selected':''}" onclick="event.stopPropagation();pickBracket('${i}')">
                  <div class="bracket-item-avatar"><img src="${p.img}" alt="${p.commander}"></div>
                  <div class="bracket-item-text">
                    <div class="bracket-item-name">${p.commanderFull}</div>
                    <div class="bracket-item-sub">${p.name}</div>
                  </div>
                  <div class="bracket-item-check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgb(26,122,106)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } else {
        html += `<div class="options-row">
          ${players.map((p,pi) => `
            <div class="opt ${sel===pi?'selected':''}" onclick="event.stopPropagation();pick(${pi})">
              <div class="opt-avatar">
                <img src="${p.img}" alt="${p.commander}">
                <div class="opt-check"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f5efe3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
              </div>
              <div class="opt-name">${p.commander}</div>
              <div class="opt-sub">${p.name}</div>
            </div>
          `).join('')}
          <div class="opt skip-opt" onclick="event.stopPropagation();pick(-1)">
            <div class="skip-arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgb(138,154,142)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
            </div>
            <div class="opt-name" style="color:rgb(138,154,142);">Skip</div>
          </div>
        </div>`;
      }
      html += `</div>`; // close q-options
    }

    html += `</div>`; // close q-card
  }

  // Confirmation card (after all questions)
  if (isConfirm) {
    let summaryHtml = Q.map(q => `
      <div class="c-row">
        <div class="c-row-icon">${iconsSm[q.key]}</div>
        <div class="c-row-label">${labels[q.key]}</div>
        <div class="c-row-value">${ans[q.key] ? ans[q.key].name : '—'}</div>
      </div>
    `).join('');

    html += `
      <div class="q-card active confirm-card">
        <div class="confirm-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgb(26,122,106)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="confirm-title">Review Complete</div>
        <div class="confirm-sub-text">Here's your feedback</div>
        <div class="confirm-summary">${summaryHtml}</div>
      </div>
    `;
  }

  track.innerHTML = html;

  // Scroll active card into view smoothly
  requestAnimationFrame(() => {
    const activeCard = track.querySelector('.q-card.active');
    if (activeCard) {
      activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });

  updateBtn();
}

function cardClick(idx) {
  // Allow clicking done cards to revisit, or the next unanswered
  if (ans[Q[idx].key] !== undefined) {
    cur = idx;
    isConfirm = false;
    render();
  }
}

function pick(pIdx) {
  const q = Q[cur];
  ans[q.key] = pIdx === -1
    ? { name:'Skipped', value:-1 }
    : { name:players[pIdx].commander, value:pIdx };

  // Animate: pop selected, fade others
  const row = document.querySelector('.options-row');
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => o.classList.remove('selected'));
  const target = pIdx === -1 ? opts[opts.length-1] : opts[pIdx];
  if (target) target.classList.add('selected');
  if (row) row.classList.add('has-selection');

  // Mark current card as about to collapse
  const curCard = document.querySelector('.q-card.active');

  setTimeout(() => {
    if (curCard) {
      curCard.classList.remove('active');
      curCard.classList.add('just-done');
    }
  }, 450);

  setTimeout(() => {
    advanceAnimated();
  }, 650);
}

function toggleBracket() {
  const dd = document.getElementById('bracketDD');
  if (dd) dd.classList.toggle('open');
}

function pickBracket(val) {
  const dd = document.getElementById('bracketDD');
  if (dd) dd.classList.remove('open');

  if (val === 'balanced') {
    ans['bracket'] = { name:'All balanced', value:'balanced', raw:'balanced' };
  } else {
    const i = parseInt(val);
    ans['bracket'] = { name:players[i].commander, value:i, raw:String(i) };
  }

  const curCard = document.querySelector('.q-card.active');
  setTimeout(() => {
    if (curCard) {
      curCard.classList.remove('active');
      curCard.classList.add('just-done');
    }
  }, 350);

  setTimeout(() => {
    advanceAnimated();
  }, 550);
}

function advance() {
  const next = findNext(cur);
  if (next !== null) {
    cur = next;
    isConfirm = false;
  } else if (allDone()) {
    isConfirm = true;
  }
  render();
}

function advanceAnimated() {
  const next = findNext(cur);
  if (next !== null) {
    cur = next;
    isConfirm = false;
  } else if (allDone()) {
    isConfirm = true;
  }
  render();

  // Tag the newly active card for grow animation
  requestAnimationFrame(() => {
    const newActive = document.querySelector('.q-card.active');
    if (newActive) {
      newActive.classList.add('just-active');
      newActive.addEventListener('animationend', () => {
        newActive.classList.remove('just-active');
      }, { once: true });
    }
  });
}

function findNext(after) {
  for (let i = after + 1; i < Q.length; i++) {
    if (!ans[Q[i].key]) return i;
  }
  for (let i = 0; i <= after; i++) {
    if (!ans[Q[i].key]) return i;
  }
  return null;
}

function updateBtn() {
  const btn = document.getElementById('actionBtn');
  if (allDone()) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}

function handleAction() {
  if (!allDone()) return;
  if (!isConfirm) { isConfirm = true; render(); return; }
  showGameCard();
}

function showGameCard() {
  const card = document.getElementById('mcCard');
  const actions = document.getElementById('mcActions');

  // Calculate most rated
  const voteCounts = {};
  Q.forEach(q => {
    if (q.key === 'bracket') return;
    const a = ans[q.key];
    if (a && a.value >= 0) {
      voteCounts[a.value] = (voteCounts[a.value] || 0) + 1;
    }
  });

  let winnerIdx = 0; // Demo: first player wins
  let mvpIdx = null;
  let mvpCount = 0;
  Object.entries(voteCounts).forEach(([idx, count]) => {
    if (count > mvpCount) { mvpCount = count; mvpIdx = parseInt(idx); }
  });

  // Demo badges earned (raw list — can have duplicates)
  const badgesRaw = [
    { key: 'brilliance' },
    { key: 'fun' },
    { key: 'fun' },
    { key: 'allegiance' },
  ];

  // Group by badge type with counts
  const badgeCounts = {};
  badgesRaw.forEach(b => {
    badgeCounts[b.key] = (badgeCounts[b.key] || 0) + 1;
  });
  const badgesEarned = Object.entries(badgeCounts).map(([key, count]) => ({ key, count }));

  const auraGain = 12; // demo

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

  const winner = players[winnerIdx];

  let html = `<div class="mc-bg"><div class="mc-inner">`;

  // Game info + aura
  html += `<div class="mc-info">
    <div>
      <div class="mc-pod">Friday Night Pod</div>
      <div class="mc-date">${dateStr} · ${timeStr}</div>
    </div>
    <div class="mc-aura">
      <div class="mc-aura-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/></svg>
      </div>
      <div class="mc-aura-val">+${auraGain}</div>
    </div>
  </div>`;

  // Commander slices
  html += `<div class="mc-slices">`;
  players.forEach(p => {
    html += `<div class="mc-slice"><img src="${p.img}" alt="${p.commander}"></div>`;
  });
  html += `</div>`;

  // Winner banner
  html += `<div class="mc-winner">
    <div class="mc-winner-crown">👑</div>
    <div class="mc-winner-info">
      <div class="mc-winner-label">Winner</div>
      <div class="mc-winner-name">${winner.commanderFull}</div>
      <div class="mc-winner-player">${winner.name}</div>
    </div>
  </div>`;

  // Players row
  html += `<div class="mc-players">`;
  players.forEach((p, i) => {
    html += `<div class="mc-p ${i === winnerIdx ? 'is-winner' : ''}">
      <div class="mc-p-avatar"><img src="${p.img}"></div>
      <div class="mc-p-commander">${p.commander}</div>
      <div class="mc-p-name">${p.name}</div>
    </div>`;
  });
  html += `</div>`;

  // Badges + stats
  html += `<div class="mc-divider"></div>`;
  html += `<div class="mc-stats">`;
  const totalBadges = badgesRaw.length;
  badgesEarned.forEach(b => {
    html += `<div class="mc-badge-circle">
      ${iconsSm[b.key]}
      ${b.count > 1 ? `<div class="mc-badge-count">${b.count}</div>` : ''}
    </div>`;
  });
  if (totalBadges > 0) {
    html += `<div style="font-size:9px;color:rgba(245,239,227,0.4);margin-left:2px;">×${totalBadges} badges earned</div>`;
  }
  html += `</div>`;

  html += `</div></div>`; // close mc-inner, mc-bg

  card.innerHTML = html;

  // Action buttons (small corner buttons)
  actions.innerHTML = `
    <div class="mc-act" onclick="event.stopPropagation(); alert('Image saved!')">
      <div class="mc-act-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
    </div>
    <div class="mc-act" onclick="event.stopPropagation(); alert('Share sheet')">
      <div class="mc-act-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </div>
    </div>
  `;

  requestAnimationFrame(() => {
    document.getElementById('mcOverlay').classList.add('show');
  });
}

function closeCard(e) {
  if (e && e.target !== document.getElementById('mcOverlay')) return;
  document.getElementById('mcOverlay').classList.remove('show');
}

render();
</script>

</body>
</html>
